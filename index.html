<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's the Diff</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="minimap.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>What's the Diff</h1>
            <div class="actions">
                <div class="nav-controls hidden" id="nav-controls">
                    <span id="diff-counter">0/0</span>
                    <button id="prev-diff" class="btn secondary" title="Previous Change">▲</button>
                    <button id="next-diff" class="btn secondary" title="Next Change">▼</button>
                </div>
                <label class="checkbox-label" title="Toggle Synchronized Scrolling">
                    <input type="checkbox" id="sync-scroll" checked>
                    <span class="checkbox-box"></span>
                    Sync Scroll
                </label>
                <button id="swap-btn" class="btn secondary" title="Swap Left and Right">⇄ Swap</button>
                <div class="separator"></div>
                <div class="mode-switch" id="mode-toggle">
                    <span class="mode-option active" data-mode="edit">Edit Text</span>
                    <span class="mode-option" data-mode="diff">View Diff</span>
                    <div class="mode-slider"></div>
                </div>
                <button id="clear-btn" class="btn secondary">Clear All</button>
            </div>
        </header>

        <main class="split-view">
            <div class="pane left-pane" id="pane-left">
                <div class="pane-header">
                    <span>Original (Drag file here)</span>
                    <button id="copy-left" class="btn icon-btn" title="Copy Original Text">Copy</button>
                </div>
                <div class="pane-content editor-mode">
                    <textarea id="input-left" placeholder="Paste text or drop a file..."></textarea>
                </div>
                <div class="pane-content diff-mode hidden" id="diff-left"></div>
            </div>

            <div class="pane right-pane" id="pane-right">
                <div class="pane-header">
                    <span>Modified (Drag file here)</span>
                    <button id="copy-right" class="btn icon-btn" title="Copy Modified Text">Copy</button>
                </div>
                <div class="pane-content editor-mode">
                    <textarea id="input-right" placeholder="Paste text or drop a file..."></textarea>
                </div>
                <div class="pane-content diff-mode hidden" id="diff-right"></div>
            </div>
            <div class="minimap" id="minimap"></div>
        </main>

        <footer>
            <p>Powered by jsdiff. Client-side only.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>

</html>
