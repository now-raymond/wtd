<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's the Diff</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="minimap.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="vendor/diff.min.js"></script>
    <script src="vendor/turndown.js"></script>
    <script src="vendor/marked.js"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="brand-row">
                <h1>What's the Diff</h1>
                <button id="mobile-more-btn" class="btn secondary mobile-only" type="button"
                    aria-haspopup="dialog" aria-controls="more-sheet"><span aria-hidden="true">•••</span> More</button>
            </div>
            <div class="actions">
                <div class="nav-controls hidden" id="nav-controls">
                    <span id="diff-counter">0/0</span>
                    <button id="prev-diff" class="btn secondary" type="button" title="Previous Change"
                        aria-label="Previous change">▲</button>
                    <button id="next-diff" class="btn secondary" type="button" title="Next Change"
                        aria-label="Next change">▼</button>
                </div>
                <label class="checkbox-label desktop-control" title="Toggle Synchronized Scrolling">
                    <input type="checkbox" id="sync-scroll" checked>
                    <span class="checkbox-box"></span>
                    Sync Scroll
                </label>
                <button id="swap-btn" class="btn secondary desktop-control" type="button"
                    title="Swap Left and Right">⇄ Swap</button>
                <div class="separator desktop-control"></div>
                <div class="mode-switch" id="mode-toggle" role="group" aria-label="Display mode">
                    <button class="mode-option active" type="button" data-mode="edit"
                        aria-pressed="true">Edit Text</button>
                    <button class="mode-option" type="button" data-mode="diff"
                        aria-pressed="false">View Diff</button>
                    <div class="mode-slider"></div>
                </div>
                <button id="clear-btn" class="btn secondary desktop-control" type="button">Clear All</button>
                <button id="settings-btn" class="btn secondary desktop-control" type="button"
                    title="Settings">⚙ Settings</button>
            </div>
        </header>

        <div class="mobile-pane-switch mobile-only" id="mobile-pane-switch" role="group"
            aria-label="Editor pane">
            <button class="mobile-pane-option active" type="button" data-pane="left"
                aria-pressed="true">Original</button>
            <button class="mobile-pane-option" type="button" data-pane="right"
                aria-pressed="false">Modified</button>
        </div>

        <main class="split-view">
            <div class="pane left-pane" id="pane-left">
                <div class="pane-header">
                    <span>Original<span class="desktop-hint"> (Drag file here)</span></span>
                    <button id="copy-left" class="btn icon-btn" tabindex="-1" title="Copy Original Text">Copy</button>
                </div>
                <div class="pane-content editor-mode">
                    <textarea id="input-left" placeholder="Paste text or drop a file..."></textarea>
                </div>
                <div class="pane-content diff-mode hidden" id="diff-left"></div>
            </div>

            <div class="pane right-pane" id="pane-right">
                <div class="pane-header">
                    <span>Modified<span class="desktop-hint"> (Drag file here)</span></span>
                    <button id="copy-right" class="btn icon-btn" tabindex="-1" title="Copy Modified Text">Copy</button>
                </div>
                <div class="pane-content editor-mode">
                    <textarea id="input-right" placeholder="Paste text or drop a file..."></textarea>
                </div>
                <div class="pane-content diff-mode hidden" id="diff-right"></div>
            </div>
            <section class="unified-diff hidden" id="diff-unified" aria-label="Unified text differences"></section>
            <div class="minimap" id="minimap"></div>
        </main>

        <footer>
            <p>Powered by jsdiff. Client-side only.</p>
        </footer>

        <!-- Settings Modal -->
        <div class="modal-overlay hidden" id="settings-modal">
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
                <div class="modal-header">
                    <h2 id="settings-title">Settings</h2>
                    <button class="modal-close" id="settings-close" type="button" aria-label="Close settings">×</button>
                </div>
                <div class="modal-content">
                    <label class="checkbox-label">
                        <input type="checkbox" id="setting-paste-markdown">
                        <span class="checkbox-box"></span>
                        Paste rich text as Markdown
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="setting-copy-richtext">
                        <span class="checkbox-box"></span>
                        Copy Markdown as rich text
                    </label>
                    <p class="setting-description">When enabled, pasted rich text (from web pages, Word, etc.) will be
                        converted to Markdown. When disabled, only plain text is used.</p>
                </div>
            </div>
        </div>

        <div class="sheet-overlay hidden" id="more-sheet">
            <div class="bottom-sheet" role="dialog" aria-modal="true" aria-labelledby="more-sheet-title">
                <div class="modal-header">
                    <h2 id="more-sheet-title">More actions</h2>
                    <button class="modal-close" id="more-sheet-close" type="button"
                        aria-label="Close more actions">×</button>
                </div>
                <div class="sheet-content">
                    <button id="mobile-swap-btn" class="sheet-action" type="button">
                        <span class="sheet-action-icon" aria-hidden="true">⇄</span><span>Swap texts</span>
                    </button>
                    <button id="mobile-settings-btn" class="sheet-action" type="button">
                        <span class="sheet-action-icon" aria-hidden="true">⚙</span><span>Settings</span>
                    </button>
                    <button id="mobile-clear-btn" class="sheet-action danger" type="button">
                        <span class="sheet-action-icon" aria-hidden="true">×</span><span>Clear all text</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
